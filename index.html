<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Conversion Master</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Sarabun', sans-serif; }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .pop { animation: pop 0.3s ease; }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
        .input-transition { transition: all 0.3s border-color; }
    </style>
</head>
<body class="h-full bg-slate-900 text-slate-100">
    <div id="app" class="min-h-full flex flex-col items-center justify-center p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-900 to-slate-900">
        
        <!-- Settings Panel -->
        <div id="settings-panel" class="w-full max-w-lg bg-slate-800/50 backdrop-blur-xl rounded-3xl p-8 border border-white/10 shadow-2xl">
            <div class="mb-8 text-center">
                <h1 id="title" class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent mb-2">เครื่องมือฝึกแปลงหน่วย</h1>
                <p class="text-slate-400">ระบุข้อมูล: Number, หุน, มิลลิเมตร</p>
            </div>
            
            <textarea id="data-input" rows="8" class="w-full bg-slate-900/50 text-slate-200 rounded-xl p-4 border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition mb-6 text-sm font-mono" placeholder="1,1,3.175..."></textarea>
            
            <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/20">
                เริ่มทำแบบทดสอบ
            </button>
        </div>

        <!-- Quiz Panel -->
        <div id="quiz-panel" class="w-full max-w-lg bg-slate-800/50 backdrop-blur-xl rounded-3xl p-8 border border-white/10 shadow-2xl hidden">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <span class="text-indigo-400 text-sm font-bold tracking-wider uppercase">Question</span>
                    <h2 class="text-2xl font-bold">ข้อที่ <span id="q-num">1</span></h2>
                </div>
                <div class="text-right">
                    <span class="text-slate-400 text-sm font-bold tracking-wider uppercase">Score</span>
                    <div class="text-2xl font-bold text-emerald-400" id="score-display">0/0</div>
                </div>
            </div>

            <div class="space-y-6 mb-8">
                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Number</label>
                        <input id="f-number" type="text" class="input-transition w-full bg-slate-900/50 rounded-xl p-4 border border-slate-700 text-center font-bold focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">หุน (Hun)</label>
                        <input id="f-hun" type="text" class="input-transition w-full bg-slate-900/50 rounded-xl p-4 border border-slate-700 text-center font-bold focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">มิลลิเมตร (mm)</label>
                        <input id="f-mm" type="text" class="input-transition w-full bg-slate-900/50 rounded-xl p-4 border border-slate-700 text-center font-bold focus:outline-none focus:border-indigo-500">
                    </div>
                </div>
            </div>

            <div id="feedback" class="text-center mb-6 h-8 font-bold transition-all"></div>

            <div class="flex flex-col gap-3">
                <button id="check-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-500/20">ตรวจคำตอบ</button>
                <button id="next-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all hidden">ข้อถัดไป</button>
                <button id="back-btn" class="w-full py-2 text-slate-500 hover:text-slate-300 text-sm transition mt-2">กลับไปหน้าตั้งค่า</button>
            </div>
        </div>
    </div>

    <script>
        let dataset = [];
        let current = null;
        let score = { correct: 0, total: 0, index: 0 };

        const el = (id) => document.getElementById(id);
        const inputs = { number: el('f-number'), hun: el('f-hun'), mm: el('f-mm') };

        // Pre-fill standard plumbing/bolt sizes
        el('data-input').value = "1,1,3.175\n2,2,6.35\n3,3,9.525\n4,4,12.7\n5,5,15.875\n6,6,19.05\n7,7,22.225\n8,8,25.4";

        el('start-btn').onclick = () => {
            dataset = el('data-input').value.trim().split('\n').map(line => {
                const [n, h, m] = line.split(',').map(s => s.trim());
                return { number: n, hun: h, mm: m };
            }).filter(d => d.number);
            
            if (dataset.length) {
                score = { correct: 0, total: 0, index: 0 };
                el('settings-panel').classList.add('hidden');
                el('quiz-panel').classList.remove('hidden');
                nextQuestion();
            }
        };

        function evaluateValue(input) {
            // Handles simple fractions like 1/2
            if (input.includes('/')) {
                const [num, den] = input.split('/').map(Number);
                return num / den;
            }
            return parseFloat(input);
        }

        function nextQuestion() {
            score.index++;
            el('q-num').innerText = score.index;
            current = dataset[Math.floor(Math.random() * dataset.length)];
            
            const fields = ['number', 'hun', 'mm'];
            const hideCount = Math.random() > 0.6 ? 2 : 1; 
            const shuffled = [...fields].sort(() => 0.5 - Math.random());
            current._hidden = shuffled.slice(0, hideCount);

            fields.forEach(f => {
                const input = inputs[f];
                input.classList.remove('border-emerald-500', 'border-red-500', 'bg-slate-800');
                if (current._hidden.includes(f)) {
                    input.value = '';
                    input.disabled = false;
                    input.placeholder = "?";
                } else {
                    input.value = current[f];
                    input.disabled = true;
                    input.placeholder = "";
                    input.classList.add('bg-slate-800');
                }
            });

            el('feedback').innerText = '';
            el('check-btn').classList.remove('hidden');
            el('next-btn').classList.add('hidden');
        }

        el('check-btn').onclick = () => {
            let isAllCorrect = true;
            current._hidden.forEach(f => {
                const userVal = inputs[f].value.trim();
                const isMatch = evaluateValue(userVal) === evaluateValue(current[f]) || userVal === current[f];
                
                if (isMatch) {
                    inputs[f].classList.add('border-emerald-500');
                } else {
                    inputs[f].classList.add('border-red-500');
                    inputs[f].value = `${userVal || '?'} → ${current[f]}`;
                    isAllCorrect = false;
                }
            });

            score.total++;
            if (isAllCorrect) {
                score.correct++;
                el('feedback').innerText = '✨ ยอดเยี่ยม! ถูกต้องทั้งหมด';
                el('feedback').className = 'text-emerald-400 font-bold pop text-center mb-6 h-8';
            } else {
                el('feedback').innerText = '❌ ยังไม่ถูก ลองดูคำตอบที่แก้ให้ด้านบน';
                el('feedback').className = 'text-red-400 font-bold shake text-center mb-6 h-8';
            }

            el('score-display').innerText = `${score.correct}/${score.total}`;
            el('check-btn').classList.add('hidden');
            el('next-btn').classList.remove('hidden');
        };

        el('next-btn').onclick = nextQuestion;
        el('back-btn').onclick = () => {
            el('quiz-panel').classList.add('hidden');
            el('settings-panel').classList.remove('hidden');
        };

        // Keyboard support
        window.onkeydown = (e) => {
            if (e.key === 'Enter') {
                if (!el('check-btn').classList.contains('hidden')) el('check-btn').click();
                else if (!el('next-btn').classList.contains('hidden')) el('next-btn').click();
            }
        };
    </script>
</body>
</html>
